<body>

<nav class="navbar navbar-expand-lg navbar-light" style="background-color:#ff6b00;">
  <a class="navbar-brand text-white" href="#">Coffee Roasters</a>

  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ml-auto">
      <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>

      <li class="nav-item"><a class="nav-link text-white" href="contactus.html">Contact Us</a></li>
    </ul>
  </div>
</nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <h2>Contact Us</h2>
      <p>We’d love to hear from you. Send us a message and we’ll get back to you soon.</p>

      <div class="card p-4 mt-4">
        <form action="#" method="post">

          <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="name" class="form-control" placeholder="Your Name" required>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="Email Address" required>
          </div>

          <div class="form-group">
            <label>Your Message</label>
            <textarea name="message" rows="5" class="form-control" placeholder="Your Message" required></textarea>
          </div>

          <button type="submit" class="form-button">Send Message</button>

        </form>
      </div>

    </div>
  </div>
</div>

<footer class="text-center py-3 mt-5" style="background:#f5f1e8;">
